<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RRC | 사진첩</title>
  <meta name="description" content="RRC 월별 사진첩과 승인 회원 업로드 페이지" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=SUIT:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20260315a" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a href="index.html" class="logo">RRC</a>
      <nav class="nav-links">
        <a href="login.html">회원가입/로그인</a>
        <a href="gallery.html">사진첩</a>
        <a href="running.html">러닝 허브</a>
        <a href="index.html">메인</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section alt">
      <div class="container two-col auth-shell gallery-shell">
        <article class="panel gallery-upload-panel">
          <div class="section-head">
            <h2>사진첩 업로드</h2>
            <span class="badge">승인 회원 업로드</span>
          </div>
          <p class="list-meta">보기는 누구나 가능하고, 업로드는 승인된 회원만 가능합니다.</p>
          <div class="gallery-status-box">
            <p id="gallery-auth-status" class="list-meta">로그인 필요</p>
            <p id="gallery-approval-status" class="list-meta">승인 상태 확인 후 업로드가 열립니다.</p>
          </div>
          <div id="gallery-guest-actions" class="auth-links-row" style="margin-bottom:0.8rem;">
            <a class="btn ghost" href="login.html">로그인 페이지</a>
            <a class="btn ghost" href="login.html">회원가입/로그인</a>
          </div>
          <div id="gallery-member-actions" class="auth-links-row hidden" style="margin-bottom:0.8rem;">
            <a class="btn ghost" href="login.html">내 활동 보드</a>
            <a class="btn ghost" href="running.html">러닝 허브</a>
          </div>
          <form class="form compact" id="photo-upload-form">
            <input id="photo-file" type="file" accept="image/*" />
            <input id="photo-caption" type="text" placeholder="한 줄 설명 (예: 화요일 잠실 정기런)" />
            <button id="photo-upload" class="btn primary" type="button">사진 업로드</button>
          </form>
          <p id="photo-status" class="list-meta">로그인 후 업로드 가능합니다.</p>
        </article>

        <article class="panel gallery-list-panel">
          <div class="section-head">
            <h2>월별 사진첩</h2>
            <span class="badge">연/월 필터</span>
          </div>
          <div class="inline-form" style="margin-top:0.8rem;">
            <select id="photo-month-filter"></select>
            <button id="photo-filter-reset" class="btn ghost" type="button">전체 보기</button>
          </div>
          <div id="photo-grid" class="photo-grid" style="margin-top:1rem;"></div>
        </article>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <p>© <span id="year"></span> RRC</p>
      <p><a href="index.html">메인으로 돌아가기</a></p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js?v=20260315b"></script>
</body>
</html>
